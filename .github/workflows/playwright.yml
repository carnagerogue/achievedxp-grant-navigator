name: e2e

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Daily run catches drift if the live data feed shape changes upstream.
  schedule:
    - cron: '17 13 * * *'
  workflow_dispatch:

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Install Playwright browser (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Run golden-path e2e
        run: npx playwright test

      - name: Upload trace + screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            test-results/
            playwright-report/
          retention-days: 7
